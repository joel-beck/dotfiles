# Starship prompt configuration
# Docs:  https://starship.rs/config/
# Icons: https://www.nerdfonts.com/cheat-sheet
#
# TOML quoting rules (important for format strings):
#   Single quotes '' вҶ’ literal strings, no escaping needed (use for most values)
#   Double quotes "" вҶ’ interpreted strings, required for multi-line format blocks
#
# Format string syntax:  [text](style)   вҶ’ styled text
#                        (...)           вҶ’ optional group (hidden when empty)
#                        \[ \] \( \)     вҶ’ escaped literal brackets/parens
#                        $module         вҶ’ inserts a module
#                        \               вҶ’ line continuation (no newline inserted)
# в”Җв”Җв”Җ Prompt Layout в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Line 1 (left):  OS В· directory В· git branch/state/status/metrics
# Line 1 (right): language versions В· command duration В· time
#          fill:  dotted separator between left and right
# Line 2:  prompt arrow (always at column 1, regardless of line 1 length)
# https://starship.rs/config/#prompt
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$git_metrics\
$fill\
$rlang$golang$python$nodejs$docker_context$cmd_duration $time

$character"""
# Insert a blank line before each prompt for visual breathing room
add_newline = true
# Raised from default 500 ms to prevent spurious timeout warnings on startup
command_timeout = 1000
continuation_prompt = 'в–¶в–¶ '

# в”Җв”Җв”Җ Prompt Character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# https://starship.rs/config/#character
# Arrow turns red on non-zero exit codes
[character]
success_symbol = '[вһң](bold green)'
error_symbol = '[вһң](bold red)'

# в”Җв”Җв”Җ OS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Shows the OS icon ( on macOS). Symbols for all OSes are in [os.symbols] below.
[os]
disabled = false
style = 'bold white'

# в”Җв”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# https://starship.rs/config/#directory
# home_symbol:       replaces ~ with an icon +  ~
# truncation_length: show at most 3 path components before truncating
# truncate_to_repo:  false вҶ’ always truncate to 3 levels, even inside a git repo
[directory]
format = '[$path]($style)[$read_only]($read_only_style) '
style = 'bold #4ECDC4'
home_symbol = ' ~'
read_only = ' п Ҫ'
read_only_style = 'red'
truncate_to_repo = false
truncation_length = 3
truncation_symbol = 'вҖҰ/'

# в”Җв”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# https://starship.rs/config/#git-branch
[git_branch]
format = 'on [$symbol$branch]($style) '
symbol = 'пҗҳ '
style = 'bold #98C379'

# Shows +N / -N line counts for the current diff
# https://starship.rs/config/#git-metrics
[git_metrics]
format = '([+$added]($added_style) )([-$deleted]($deleted_style) )'
added_style = 'bold green'
deleted_style = 'bold red'
disabled = false

# Shown during rebase, merge, bisect, etc. вҖ” e.g. "REBASE 3/5"
# https://starship.rs/config/#git-state
[git_state]
format = '[$state( $progress_current/$progress_total)]($style) '
style = 'bold yellow'
disabled = false

# Symbol key:
#   вҮЎN ahead   вҮЈN behind   вҮ• diverged
#   **N modified   ++N staged   --N deleted
#   ??N untracked   $N stashed   !! conflicted   вң“ up to date
# https://starship.rs/config/#git-status
[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold yellow'
ahead = 'вҮЎ${count}'
behind = 'вҮЈ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
conflicted = '[!!\($count\)](red) '
deleted = '[--\($count\)](red) '
modified = '[**\($count\)](yellow) '
staged = '[++\($count\)](green) '
stashed = '[\$\($count\)](green) '
untracked = '[??\($count\)](red) '
up_to_date = '[вң“](bold green)'

# в”Җв”Җв”Җ Fill в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Dotted separator between the left (git) and right (languages/time) sections
# https://starship.rs/config/#fill
[fill]
symbol = 'В·'

# в”Җв”Җв”Җ Command Duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Shows elapsed time for commands that take longer than min_time
# https://starship.rs/config/#command-duration
[cmd_duration]
format = '[$duration]($style)'
style = 'bold yellow'
min_time = 1_000

# в”Җв”Җв”Җ Languages в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Only shown when a relevant project file is detected in the current directory.
# To customise appearance, add format/style/version_format here (see python below).
[python]
# format breakdown: symbol В· version (major.minor only) В· [virtualenv name]
# https://starship.rs/config/#python
format = '[${symbol}(${version} )(\[${virtualenv}\] )]($style)'
symbol = 'оҲө '
style = 'bold yellow'
version_format = 'v${major}.${minor}'
pyenv_version_name = false
pyenv_prefix = 'pyenv '

[nodejs]
format = '[$symbol($version )]($style)'
symbol = 'оңҳ '

[golang]
symbol = 'оҳ§ '

[rlang]
symbol = 'пі’ '

[docker_context]
symbol = ' '

# в”Җв”Җв”Җ Time в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
# Trailing space ensures the time is not flush against the terminal edge
[time]
format = '[$time ]($style)'
style = 'bold white'
disabled = false

# в”Җв”Җв”Җ OS Symbols в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
